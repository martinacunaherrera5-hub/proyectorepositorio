<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/main.css">
    <!--Bootstrap 5-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Font Awesome 6 (Versión correcta)-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Chat-sena</title>
</head>
<body>
    <nav class="navbar navbar-light bg-info mb-4">
        <a class="navbar-brand mx-auto" href="/"> Chat-sena</a>
    </nav>

    <!-- Formulario de Login -->
    <div class="container" id="nickWrap">
        <div class="card col-md-4 mx-auto text-center">
            <div class="card-header bg-info">
                <h3>Ingresa tu nombre de usuario</h3>
            </div>
            <div class="card-body">
                <p id="nickError"></p>
                <form id="nick-form">
                    <input type="text" id="nickname" class="form-control" placeholder="Nombre de usuario" required minlength = "2"
                    placeholder = "nombre de usuario..." autocomplete="off">
                    <button type="submit" class="btn btn-info w-100 mt-3">
                        Entrar <i class="fa-solid fa-right-to-bracket"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Contenedor del Chat (Oculto al inicio) -->
    <div class="container" id="contentWrap" style="display: none;">
        <div class="row">
            <!-- Ventana de Mensajes -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-info">
                        <h4> Sala de Chat</h4>
                    </div>
                    <div id="chat" class="card-body" style="height: 400px; overflow-y: auto; background: #f8f9fa;"></div>
                    <form id="message-form" class="card-footer">
                        <div class="input-group">
                            <input type="text" class="form-control" id="message" placeholder="Escribe un mensaje...">
                            <button type="submit" class="btn btn-info">
                                Enviar <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </div>
                    </form>
              </div>
            </div>
            <!-- Lista de Usuarios -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-info">
                 <h4> Conectados</h4>
                    </div>
                    <div class="card-body">
                        <div id="usernames"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
